      <stop offset="0.18" stop-color="#111723"/>
      <stop offset="0.5" stop-color="#070a10"/>
      <stop offset="0.82" stop-color="#111723"/>
      <stop offset="1" stop-color="#01030a"/>
    </linearGradient>
    <linearGradient id="desert" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a2418"/>
      <stop offset="1" stop-color="#100909"/>
    </linearGradient>
    <filter id="blur40"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur18"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
