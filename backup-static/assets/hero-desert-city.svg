<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic desert road toward a glowing future city</title>
  <desc id="desc">A stylized but more realistic night desert scene with a moon, haze, road perspective, distant glowing city, and passing vehicle lights.</desc>
  <defs>
    <radialGradient id="skyMoon" cx="76%" cy="15%" r="34%">
      <stop offset="0" stop-color="#dff3ff" stop-opacity="0.45"/>
      <stop offset="0.22" stop-color="#78c8ff" stop-opacity="0.18"/>
      <stop offset="0.65" stop-color="#071327" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cityGlow" cx="72%" cy="52%" r="34%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.52"/>
      <stop offset="0.28" stop-color="#f05bd8" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#f7b955" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#050813" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#020512"/>
      <stop offset="0.48" stop-color="#071326"/>
      <stop offset="0.75" stop-color="#130b0a"/>
      <stop offset="1" stop-color="#050813"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="1">
