<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auralis Digital</title>
  <script>
    // SPA redirect: GitHub Pages 404 → send back to index with path preserved
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash);
  </script>
</head>
<body></body>
</html>
