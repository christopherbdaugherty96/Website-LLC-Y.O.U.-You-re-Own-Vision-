<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Auralis Digital logo</title>
  <desc id="desc">Premium Auralis Digital AD mark with blue and silver styling on a dark background.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0f5dce"/>
      <stop offset="0.48" stop-color="#2ea8ff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#b9c0ca"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#2ea8ff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#050813" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="900" height="500" rx="42" fill="#050813"/>
  <rect width="900" height="500" rx="42" fill="url(#glow)"/>
  <g filter="url(#shadow)" transform="translate(0 4)">
    <path d="M280 278 L392 92 L504 278 H438 L392 198 L347 278 Z" fill="url(#blue)"/>
    <path d="M448 118 H586 C669 118 724 171 724 250 C724 329 669 382 586 382 H424 L459 322 H586 C630 322 660 293 660 250 C660 207 630 178 586 178 H482 Z" fill="url(#silver)"/>
  </g>
  <text x="450" y="428" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700" letter-spacing="24" fill="#f8fafc">AURALIS</text>
  <g transform="translate(214 452)">
    <rect x="0" y="0" width="110" height="2" fill="#2ea8ff" opacity="0.8"/>
    <text x="236" y="17" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="24" fill="#2ea8ff">DIGITAL</text>
    <rect x="482" y="0" width="110" height="2" fill="#2ea8ff" opacity="0.8"/>
  </g>
</svg>
